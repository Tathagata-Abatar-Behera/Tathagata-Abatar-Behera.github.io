<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Aesthetic Website</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            color:#333;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:15px;
            text-align:center;
            width:90%;
            max-width:500px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h1{
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:20px;
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:8px;
            background:#333;
            color:white;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        footer{
            margin-top:20px;
            font-size:14px;
            color:#888;
        }
    </style>
</head>
<body>

    <main class="container">
        <header>
            <h1>Welcome</h1>
        </header>

        <section>
            <p>A simple aesthetic website built with semantic HTML.</p>
            <button>Explore</button>
        </section>

        <footer>
            © 2026 My Website
        </footer>
    </main>

</body>
</html>
